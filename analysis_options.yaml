include: package:very_good_analysis/analysis_options.yaml

formatter:
  trailing_commas: preserve
  page_width: 120

linter:
  rules:
    document_ignores: false # https://dart.dev/tools/linter-rules/document_ignores
    always_use_package_imports: false # https://dart.dev/tools/linter-rules/always_use_package_imports
    public_member_api_docs: false # https://dart.dev/tools/linter-rules/public_member_api_docs
    lines_longer_than_80_chars: false # https://dart.dev/tools/linter-rules/lines_longer_than_80_chars
    avoid_positional_boolean_parameters: false # https://dart.dev/tools/linter-rules/avoid_positional_boolean_parameters
    avoid_catches_without_on_clauses: false # https://dart.dev/tools/linter-rules/avoid_catches_without_on_clauses
